  <rect x="182" y="356" width="18" height="44" rx="3" fill="#4a9eff"/>
  <rect x="222" y="356" width="18" height="44" rx="3" fill="#4a9eff"/>
  <rect x="262" y="356" width="18" height="44" rx="3" fill="#4a9eff"/>
  <rect x="302" y="356" width="18" height="44" rx="3" fill="#4a9eff"/>
